<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Diabetes Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 20px;
    width: 450px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #00c6ff;
    border: none;
    border-radius: 10px;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0072ff;
    color: white;
}

.result {
    margin-top: 15px;
    text-align: center;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
<h2>🩺 AI Diabetes Predictor</h2>

<form action="/predict" method="post">

<input name="preg" placeholder="Pregnancies" required>
<input name="glucose" placeholder="Glucose" required>
<input name="bp" placeholder="Blood Pressure" required>
<input name="skin" placeholder="Skin Thickness" required>
<input name="insulin" placeholder="Insulin" required>
<input name="bmi" placeholder="BMI" required>
<input name="dpf" placeholder="Diabetes Pedigree Function" required>
<input name="age" placeholder="Age" required>
<input name="hypertension" placeholder="Hypertension (0/1)" required>
<input name="heart" placeholder="Heart Disease (0/1)" required>
<input name="smoking" placeholder="Smoking (0/1)" required>

<button type="submit">Predict</button>

</form>

<div class="result">
    {{ prediction_text }}
</div>

</div>

</body>
</html>
